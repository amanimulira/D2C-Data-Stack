version: 2

sources:
  - name: ga4
    description: |
      GA4 event stream. In production this is shipped from the GA4 BigQuery export
      (`events_YYYYMMDD` daily tables) into Snowflake via Hightouch / Census /
      a custom replication job. The schema in this reference implementation is a
      flattened version of the BQ export — `event_params` and `user_properties`
      are pre-pivoted into top-level columns (source / medium / campaign / page_*).
    schema: raw_ga4

    freshness:
      warn_after:  { count: 36, period: hour }
      error_after: { count: 72, period: hour }
    loaded_at_field: event_timestamp

    tables:
      - name: ga4_events
        identifier: ga4_events
        description: One row per event. Standard event names — `session_start`, `page_view`, `view_item`, `add_to_cart`, `begin_checkout`, `purchase`.
        columns:
          - name: event_id
            tests: [unique, not_null]
